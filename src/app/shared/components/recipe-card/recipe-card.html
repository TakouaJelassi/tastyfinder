<article
  class="card"
  (click)="openDetail()"
  role="button"
  tabindex="0"
  (keydown.enter)="openDetail()"
  [attr.aria-label]="recipe().title"
>
  <div class="card-img-wrap">
    <img
      [src]="recipe().image"
      [alt]="recipe().title"
      loading="lazy"
      (error)="onImageError($event)"
    />
    <div class="card-overlay"></div>
    <button
      class="fav-btn"
      (click)="toggleFavorite($event)"
      [class.active]="isFavorite()"
      aria-label="Favorit togglen"
    >
      <app-icon name="heart" [size]="18" [filled]="isFavorite()" />
    </button>
  </div>
  <div class="card-body">
    <h3 class="card-title">{{ recipe().title }}</h3>
  </div>
</article>
