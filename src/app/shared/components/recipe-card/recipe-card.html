<article class="card" (click)="openDetail()" role="button" tabindex="0" (keydown.enter)="openDetail()" [attr.aria-label]="recipe().strMeal">
  <div class="card-img-wrap">
    <img [src]="recipe().strMealThumb" [alt]="recipe().strMeal" loading="lazy" />
    <div class="card-overlay"></div>
    <button class="fav-btn" (click)="toggleFavorite($event)" [class.active]="isFavorite()" aria-label="Favorit togglen">
      <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    </button>
  </div>
  <div class="card-body">
    <h3 class="card-title">{{ recipe().strMeal }}</h3>
    <div class="card-meta">
      <span class="card-category">{{ recipe().strCategory }}</span>
      <span class="card-area">{{ recipe().strArea }}</span>
    </div>
  </div>
</article>
