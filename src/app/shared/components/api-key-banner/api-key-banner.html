@if (!hasKey()) {
  <div class="banner">
    <div class="banner-left">
      <span class="banner-icon">🔑</span>
      <div class="banner-info">
        <span class="banner-title">AI-Demo erfordert einen Groq API Key</span>
        <span class="banner-sub">
          Kostenlos unter
          <a href="https://console.groq.com/keys" target="_blank" rel="noopener"
            >console.groq.com</a
          >
          — dauert 30 Sekunden
        </span>
      </div>
    </div>
    <div class="banner-right">
      <input
        type="password"
        placeholder="gsk_..."
        [ngModel]="keyInput()"
        (ngModelChange)="keyInput.set($event)"
        (keyup.enter)="save()"
      />
      <button class="btn-save" (click)="save()">Aktivieren</button>
    </div>
  </div>
} @else {
  <div class="banner success">
    <span class="banner-icon">✅</span>
    <span class="banner-text">AI aktiv (Groq)</span>
    @if (saved()) {
      <span class="saved-msg">Key gespeichert!</span>
    }
    <button class="btn-remove" (click)="remove()">Key entfernen</button>
  </div>
}
