<div class="home">
  <header class="hero">
    <h1>🍽 TastyFinder</h1>
    <p>Entdecke tausende Rezepte aus aller Welt</p>
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input
        type="text"
        placeholder="Rezept suchen..."
        [ngModel]="searchTerm()"
        (ngModelChange)="onSearch($event)"
      />
    </div>
  </header>

  <main class="container">
    <div class="categories">
      @for (cat of categories(); track cat.idCategory) {
        <button
          class="cat-chip"
          [class.active]="selectedCategory() === cat.strCategory"
          (click)="onCategorySelect(cat.strCategory)"
        >
          {{ cat.strCategory }}
        </button>
      }
    </div>

    <div class="grid">
      @if (loading()) {
        <app-skeleton-loader />
      } @else {
        @for (recipe of recipes(); track recipe.idMeal) {
          <app-recipe-card [recipe]="recipe" />
        } @empty {
          <p class="empty">Keine Rezepte gefunden.</p>
        }
      }
    </div>
  </main>
</div>
